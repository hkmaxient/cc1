<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maxient Inc</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text-primary: #f0f0f5;
      --text-secondary: #8b8fa8;
      --accent: #7c6af7;
      --accent-hover: #9b8cf9;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem;
      max-width: 560px;
      width: 100%;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #4fa3e0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1.5rem;
      letter-spacing: -1px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

    .role {
      font-size: 0.95rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    .bio {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .link:hover {
      border-color: var(--accent);
      color: var(--accent-hover);
      background: rgba(124, 106, 247, 0.08);
    }

    .link svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">MI</div>

    <h1>Maxient Inc</h1>
    <p class="role">Software Engineering</p>

    <p class="bio">Demo bio from a software engineer.</p>

    <hr class="divider" />

    <nav class="links">
      <a class="link" href="https://github.com/hkmaxient" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

        </svg>
        GitHub
      </a>
    </nav>
  </div>
</body>
</html>
